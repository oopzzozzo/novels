<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>怪力亂神 - 垂直閱讀器</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-color: #2c2c2c;
            --border-color: #d1ccc0;
            --btn-bg: #5d5d5d;
            --btn-hover: #444;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", "Noto Serif TC", serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #header {
            padding: 10px 20px;
            background: #e8e4d8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 100;
            flex-shrink: 0;
        }
        #reader-container {
            flex: 1;
            padding: 40px 5%;
            writing-mode: vertical-rl;
            -webkit-writing-mode: vertical-rl;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            cursor: grab;
        }
        #reader-container:active { cursor: grabbing; }
        
        #content {
            font-size: 24px;
            line-height: 2;
            letter-spacing: 0.1em;
            max-height: 100%;
            white-space: pre-wrap;
            text-align: justify;
        }
        .btn {
            padding: 8px 16px;
            background: var(--btn-bg);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--btn-hover); }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #file-info {
            font-weight: bold;
            font-size: 18px;
            writing-mode: horizontal-tb;
        }
        .nav-group { display: flex; align-items: center; gap: 15px; }
        .chapter-label {
            font-size: 12px;
            color: #666;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
        }
        
        #reader-container::-webkit-scrollbar { height: 8px; }
        #reader-container::-webkit-scrollbar-track { background: transparent; }
        #reader-container::-webkit-scrollbar-thumb {
            background: #d1ccc0;
            border-radius: 4px;
        }
        #reader-container::-webkit-scrollbar-thumb:hover { background: #b1aca0; }

        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        #directoryInput { display: none; }
    </style>
</head>
<body>
    <div id="header">
        <div class="nav-group">
            <input type="file" id="directoryInput" webkitdirectory directory multiple>
            <button class="btn" id="pickFolder">選擇資料夾</button>
            <button class="btn" id="prevBtn" title="上一章">
                <span>◀</span> <span id="prevLabel" class="chapter-label"></span>
            </button>
        </div>
        <div id="file-info">請點擊選擇資料夾</div>
        <div class="nav-group">
            <button class="btn" id="nextBtn" title="下一章">
                <span id="nextLabel" class="chapter-label"></span> <span>▶</span>
            </button>
        </div>
    </div>
    <div id="reader-container">
        <div id="content"></div>
    </div>

    <script>
        let chapters = [];
        let currentIndex = -1;

        const contentDiv = document.getElementById('content');
        const fileInfo = document.getElementById('file-info');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const prevLabel = document.getElementById('prevLabel');
        const nextLabel = document.getElementById('nextLabel');
        const pickBtn = document.getElementById('pickFolder');
        const directoryInput = document.getElementById('directoryInput');
        const container = document.getElementById('reader-container');

        function naturalSort(a, b) {
            return a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'});
        }

        pickBtn.addEventListener('click', () => {
            directoryInput.click();
        });

        directoryInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files)
                .filter(file => file.name.endsWith('.txt'))
                .sort(naturalSort);
            
            if (files.length === 0) {
                alert("找不到 .txt 檔案");
                return;
            }

            chapters = files;
            console.log(`Loaded ${chapters.length} chapters.`);
            loadChapter(0);
        });

        async function loadChapter(index) {
            if (index < 0 || index >= chapters.length) return;
            
            currentIndex = index;
            const file = chapters[currentIndex];
            let text = await file.text();
            
            // Masking common horizontal characters for vertical display
            const masks = [
                [/…/g, '︙'],
                [/《/g, '﹃'],
                [/》/g, '﹄'],
                [/〈/g, '︿'],
                [/〉/g, '﹀'],
                [/（/g, '︵'],
                [/）/g, '︶']
            ];
            
            masks.forEach(([reg, rep]) => {
                text = text.replace(reg, rep);
            });

            contentDiv.innerText = text;
            fileInfo.innerText = file.name.replace('.txt', '');
            
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');
            
            updateNavUI();
            
            container.scrollLeft = container.scrollWidth;
        }

        function updateNavUI() {
            if (currentIndex > 0) {
                prevBtn.disabled = false;
                prevLabel.innerText = chapters[currentIndex-1].name.replace('.txt', '');
            } else {
                prevBtn.disabled = true;
                prevLabel.innerText = "";
            }

            if (currentIndex < chapters.length - 1) {
                nextBtn.disabled = false;
                nextLabel.innerText = chapters[currentIndex+1].name.replace('.txt', '');
            } else {
                nextBtn.disabled = true;
                nextLabel.innerText = "";
            }
        }

        prevBtn.addEventListener('click', () => loadChapter(currentIndex - 1));
        nextBtn.addEventListener('click', () => loadChapter(currentIndex + 1));

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') loadChapter(currentIndex + 1); 
            if (e.key === 'ArrowRight') loadChapter(currentIndex - 1);
        });

        // Drag to scroll
        let isDown = false;
        let startX;
        let scrollLeft;

        container.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - container.offsetLeft;
            scrollLeft = container.scrollLeft;
        });
        container.addEventListener('mouseleave', () => { isDown = false; });
        container.addEventListener('mouseup', () => { isDown = false; });
        container.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - container.offsetLeft;
            const walk = (x - startX) * 2;
            container.scrollLeft = scrollLeft - walk;
        });
    </script>
</body>
</html>
